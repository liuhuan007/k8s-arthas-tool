<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Arthas K8s 诊断台 — 登录</title>
<script>
// 认证 key（与 index.html 一致）
var AUTH_KEY = 'arthas_auth_token';
var AUTH_USER = 'arthas_auth_user';
var REMEMBER_KEY = 'arthas_remember';
(function(){try{if(localStorage.getItem('ops_ui_theme')==='devops')document.documentElement.setAttribute('data-ops-theme','devops');}catch(e){}})();
</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Design tokens — 与 index.html 完全一致 ── */
:root{
  --bg:#061426;--bg1:#0b1f38;--bg2:#0f2d4f;--bg3:#16406d;
  --ln:#1d4f7a;--ln2:#2d6fa3;
  --a:#0ea5ff;--a2:#66c7ff;--a3:#34d399;--a4:#38bdf8;--a5:#f87171;--a6:#f59e0b;
  --tx:#e6f4ff;--tx2:#a9c6df;--tx3:#6f91ae;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
}
html[data-ops-theme="devops"]{
  --bg:#f4f7fb;--bg1:#ffffff;--bg2:#f8fafc;--bg3:#edf2f7;
  --ln:#dce5ef;--ln2:#c4d3e2;
  --a:#2563eb;--a2:#3b82f6;--a3:#16a34a;--a4:#1d4ed8;--a5:#dc2626;--a6:#d97706;
  --tx:#1e293b;--tx2:#64748b;--tx3:#94a3b8;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:linear-gradient(180deg,#f7fbff 0%,var(--bg) 100%);color:var(--tx);font-family:var(--mono);font-size:13px;overflow:hidden}
html:not([data-ops-theme="devops"]),html:not([data-ops-theme="devops"]) body{background:radial-gradient(circle at 18% 18%,rgba(14,165,255,.22),transparent 28%),radial-gradient(circle at 80% 10%,rgba(52,211,153,.10),transparent 30%),linear-gradient(180deg,#061426 0%,#081a2d 100%)}

/* ── Topbar — 与 index.html 完全相同结构 ── */
.topbar{height:44px;background:var(--bg1);border-bottom:1px solid var(--ln);
  display:flex;align-items:center;flex-shrink:0}
.tb-logo{display:flex;align-items:center;gap:10px;padding:0 16px;
  border-right:1px solid var(--ln);height:100%;flex-shrink:0;text-decoration:none}
.tb-hex{width:24px;height:24px;background:var(--a);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
.tb-title{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--tx);letter-spacing:.5px}
.tb-title em{color:var(--a);font-style:normal}
.tb-links{display:flex;align-items:center;gap:6px;padding:0 14px}
.tb-lnk{padding:3px 9px;border-radius:3px;font-size:11px;border:1px solid var(--ln2);
  color:var(--tx2);cursor:pointer;transition:all .15s;text-decoration:none}
.tb-lnk:hover{border-color:var(--a);color:var(--a);background:rgba(22,119,255,.08)}
.tb-right{margin-left:auto;display:flex;align-items:center}
.tb-srv{display:flex;align-items:center;gap:6px;padding:0 14px;
  border-left:1px solid var(--ln);font-size:11px;color:var(--tx2)}
.theme-switcher{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 8px;border-left:1px solid var(--ln);color:var(--tx2);font-size:11px;white-space:nowrap}
.theme-switcher select{height:22px;min-width:112px;border:1px solid var(--ln2);border-radius:5px;background:var(--bg2);color:var(--tx);font-family:var(--mono);font-size:11px;outline:none;cursor:pointer}
.theme-switcher select:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(14,165,255,.14)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--tx3)}

/* ── Page ── */
.page{height:calc(100vh - 44px);display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden}

/* 背景网格（与 index 的暗色调一致） */
.page::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(22,119,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(22,119,255,.05) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
/* 中心光晕 */
.page::after{
  content:'';position:absolute;
  width:600px;height:400px;
  background:radial-gradient(ellipse, rgba(22,119,255,.14) 0%, transparent 70%);
  pointer-events:none;
}

/* ── Login card ── */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:var(--bg1);
  border:1px solid var(--ln);
  border-radius:8px;
  box-shadow:0 24px 64px rgba(22,119,255,.12), 0 0 0 1px rgba(22,119,255,.08);
  overflow:hidden;
  animation:fadeUp .35s ease;
}

/* 顶部彩色边框线 */
.card-accent{
  height:3px;
  background:linear-gradient(90deg, var(--a), var(--a2), var(--a3));
}

.card-head{
  padding:20px 24px 16px;
  border-bottom:1px solid var(--ln);
  display:flex;align-items:center;gap:12px;
}
.card-icon{
  width:32px;height:32px;
  background:rgba(22,119,255,.10);
  border:1px solid rgba(22,119,255,.24);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-icon svg{width:16px;height:16px;fill:var(--a)}
.card-title{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--tx)}
.card-sub{font-size:11px;color:var(--tx2);margin-top:1px}

.card-body{padding:22px 24px 20px}

/* ── Form elements ── */
.form-group{margin-bottom:14px}
.form-label{
  display:block;font-size:11px;font-weight:600;
  color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:6px;
}
.input-wrap{
  display:flex;align-items:center;
  background:var(--bg2);
  border:1px solid var(--ln);
  border-radius:4px;
  transition:border-color .15s, box-shadow .15s;
  overflow:hidden;
}
.input-wrap:focus-within{
  border-color:var(--a);
  box-shadow:0 0 0 3px rgba(22,119,255,.14);
}
.input-wrap.error{border-color:var(--a5)}
.input-wrap.error:focus-within{box-shadow:0 0 0 3px rgba(248,113,113,.1)}
.input-icon{
  width:36px;display:flex;align-items:center;justify-content:center;
  color:var(--tx3);border-right:1px solid var(--ln);flex-shrink:0;
  font-size:14px;height:100%;padding:0;
}
.input-icon svg{width:14px;height:14px;fill:var(--tx3);transition:fill .15s}
.input-wrap:focus-within .input-icon svg{fill:var(--a)}
.form-input{
  flex:1;border:none;outline:none;
  padding:9px 10px;
  font-size:12px;font-family:var(--mono);
  color:var(--tx);background:transparent;
}
.form-input::placeholder{color:var(--tx3)}

/* ── Remember + error ── */
.remember-row{
  display:flex;align-items:center;gap:7px;
  margin-bottom:18px;cursor:pointer;
}
.remember-row input[type=checkbox]{
  width:13px;height:13px;accent-color:var(--a);cursor:pointer;flex-shrink:0;
}
.remember-row span{font-size:11px;color:var(--tx2)}

.err-msg{
  background:rgba(248,113,113,.08);
  border:1px solid rgba(248,113,113,.25);
  border-radius:4px;color:var(--a5);
  font-size:11px;padding:7px 10px;
  margin-bottom:14px;display:none;
}
.err-msg.show{display:flex;align-items:center;gap:6px}

/* ── Submit button — 与 .pt-btn 风格一致 ── */
.btn-login{
  width:100%;
  padding:9px;
  background:var(--a);
  border:none;border-radius:4px;
  color:#fff;
  font-family:var(--mono);font-size:12px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
  letter-spacing:.3px;
}
.btn-login:hover{background:#4096ff;box-shadow:0 10px 24px rgba(22,119,255,.24)}
.btn-login:active{transform:scale(.99)}
.btn-login:disabled{background:var(--tx3);color:var(--bg);cursor:not-allowed;box-shadow:none}
.btn-login svg{width:14px;height:14px;fill:#fff}

/* ── Spinner ── */
.spinner{
  width:13px;height:13px;
  border:2px solid rgba(11,15,24,.3);
  border-top-color:#0b0f18;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;flex-shrink:0;
}

/* ── Footer ── */
.card-foot{
  padding:12px 24px 16px;
  border-top:1px solid var(--ln);
  display:flex;align-items:center;justify-content:center;
  gap:6px;
  font-size:11px;color:var(--tx3);
}
.card-foot a{color:var(--a);text-decoration:none;transition:color .15s}
.card-foot a:hover{color:#4096ff}

/* ── Hint below card ── */
.hint{
  position:absolute;bottom:24px;
  font-size:11px;color:var(--tx3);
  display:flex;align-items:center;gap:5px;
  animation:fadeUp .5s .2s ease both;
}
.hint code{
  background:var(--bg2);border:1px solid var(--ln);
  border-radius:3px;padding:1px 6px;
  color:var(--a);font-family:var(--mono);
}

@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shake  {0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
</style>
</head>
<body>

<!-- Topbar — 与 index.html 完全一致 -->
<div class="topbar">
  <a class="tb-logo" href="#">
    <div class="tb-hex"></div>
    <span class="tb-title">Arthas <em>K8s</em></span>
  </a>
  <div class="tb-links">
    <a class="tb-lnk" href="https://arthas.aliyun.com/en/doc/" target="_blank">📖 官方文档</a>
    <a class="tb-lnk" href="https://arthas.aliyun.com/en/doc/commands.html" target="_blank">📋 命令手册</a>
  </div>
  <div class="tb-right">
    <div class="tb-srv">
      <div class="dot"></div>
      <span>请先登录</span>
    </div>
    <label class="theme-switcher" title="切换界面风格">
      <span>风格</span>
      <select data-theme-switcher aria-label="切换界面风格">
        <option value="apm">深色APM风格</option>
        <option value="devops">蓝白DevOps风格</option>
      </select>
    </label>
  </div>
</div>

<!-- Page -->
<div class="page">

  <!-- Login card -->
  <div class="card" id="loginCard">
    <div class="card-accent"></div>

    <div class="card-head">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M10 17v-3H3v-4h7V7l5 5-5 5zM20 3H4c-1.1 0-2 .9-2 2v4h2V5h16v14H4v-4H2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <div class="card-title">用户登录</div>
        <div class="card-sub">Arthas K8s 诊断台 · 请先验证身份</div>
      </div>
    </div>

    <div class="card-body">
      <div class="err-msg" id="errMsg">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:var(--a5);flex-shrink:0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        用户名或密码错误，请重试
      </div>

      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrap" id="userWrap">
            <div class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <input class="form-input" id="username" type="text"
              placeholder="输入用户名" autocomplete="username"
              oninput="clearErr()" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrap" id="passWrap">
            <div class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg>
            </div>
            <input class="form-input" id="password" type="password"
              placeholder="输入密码" autocomplete="current-password"
              oninput="clearErr()" required>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" id="rememberMe">
          <span>记住我</span>
        </label>

        <button class="btn-login" type="submit" id="loginBtn">
          <svg viewBox="0 0 24 24"><path d="M10 17v-3H3v-4h7V7l5 5-5 5zM20 3H4c-1.1 0-2 .9-2 2v4h2V5h16v14H4v-4H2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          <div class="spinner" id="spinner"></div>
          登 录
        </button>
      </form>
    </div>

    <div class="card-foot">
      <svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:var(--tx3)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      内部诊断工具 · 请联系管理员获取账号
    </div>
  </div>

  <!-- 底部提示 -->
  <div class="hint">
    输入账号密码登录系统
  </div>

</div>

<script src="js/core/api.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/theme-switcher.js?v=20260619b"></script>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  // 检查是否已登录（使用原生 fetch，避免 safeGet 的 401 自动跳转导致无限刷新）
  try {
    const resp = await fetch('/api/auth/current', { credentials: 'include' });
    const data = await resp.json();
    if (data && data.authenticated && data.user) {
      // 后端 session 有效且有用户信息 → 同步到本地存储后跳转
      sessionStorage.setItem(AUTH_USER, JSON.stringify(data.user));
      sessionStorage.setItem(AUTH_KEY, 'logged_in');
      window.location.href = '/index.html';
      return;
    }
  } catch (e) {
    console.log('Auth check skipped:', e.message);
  }

  // 恢复记住我
  try {
    const d = JSON.parse(localStorage.getItem(REMEMBER_KEY) || 'null');
    if (d) {
      document.getElementById('username').value = d.u || '';
      document.getElementById('password').value = d.p || '';
      document.getElementById('rememberMe').checked = true;
    }
  } catch {}

  // 自动聚焦
  setTimeout(() => {
    const u = document.getElementById('username');
    (u.value ? document.getElementById('password') : u).focus();
  }, 80);
});

// 登录成功后直接跳转
function redirectToIndex() {
  window.location.href = '/index.html';
}

async function doLogin(e) {
  e.preventDefault();
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const rm = document.getElementById('rememberMe').checked;
  const btn = document.getElementById('loginBtn');
  const sp = document.getElementById('spinner');
  
  btn.disabled = true; 
  sp.style.display = 'block';
  clearErr();

  try {
    console.log('Logging in...', u);
    console.log('API URL:', typeof API !== 'undefined' ? API : 'not loaded yet');
    const resp = await safePost('/auth/login', { username: u, password: p });
    console.log('Login response:', resp);
    
    // 登录成功 - 兼容处理
    if (resp.ok === true || (resp.ok !== false && !resp.error)) {
      console.log('Login OK, setting token...');
      if (rm) {
        localStorage.setItem(REMEMBER_KEY, JSON.stringify({ u, p }));
      } else {
        localStorage.removeItem(REMEMBER_KEY);
      }
      
      // 存储用户信息
      if (resp.user) {
        sessionStorage.setItem(AUTH_USER, JSON.stringify(resp.user));
      }

      // 存储 token（标记已登录，供 index.html 登录检查使用）
      // 使用 localStorage 确保持久化
      localStorage.setItem(AUTH_KEY, 'logged_in');
      
      console.log('Token set, redirecting to:', '/index.html');
      redirectToIndex();
      return;
    } else {
      console.log('Login failed:', resp);
      showErr(resp.error || '登录失败');
    }
  } catch (err) {
    console.error('Login error:', err);
    showErr(err.message || '登录失败');
  } finally {
    sp.style.display = 'none'; 
    btn.disabled = false;
  }
}

function showErr(msg) {
  const errEl = document.getElementById('errMsg');
  errEl.childNodes[errEl.childNodes.length - 1].textContent = msg;
  errEl.classList.add('show');
  document.getElementById('userWrap').classList.add('error');
  document.getElementById('passWrap').classList.add('error');
  const c = document.getElementById('loginCard');
  c.style.animation = 'none';
  c.offsetHeight;
  c.style.animation = 'shake .4s ease';
}

function clearErr() {
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('userWrap').classList.remove('error');
  document.getElementById('passWrap').classList.remove('error');
}
</script>
</body>
</html>
